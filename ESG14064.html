<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8欄位資料收集分類與 Excel 匯出系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1000px; margin: 30px auto; padding: 20px; background-color: #f5f7fa; color: #333; }
        h2, h3 { color: #2c3e50; margin-top: 0; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
        
        /* 8欄位表單排版 */
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 2; }
        label { font-weight: bold; margin-bottom: 5px; color: #4a5568; font-size: 14px; }
        input, select, textarea { padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        textarea { height: 60px; resize: vertical; }
        
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        
        .btn-group { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
        .excel-btn { background-color: #27ae60; margin-top: 0; }
        .excel-btn:hover { background-color: #219653; }
        .clear-btn { background-color: #e74c3c; margin-left: auto; margin-top: 0; }
        .clear-btn:hover { background-color: #c0392b; }
        
        /* 表格排版 */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 800px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: left; font-size: 13px; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f8fafc; }
        
        /* 分類標籤樣式 */
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; color: white; display: inline-block; }
        .bg-A { background-color: #2ecc71; }
        .bg-B { background-color: #e67e22; }
        .bg-C { background-color: #9b59b6; }
        .bg-D { background-color: #3498db; }
        .bg-other { background-color: #95a5a6; }
    </style>
</head>
<body>

    <h2>📥 8欄位資料收集分類與 Excel 匯出系統</h2>

    <!-- 1-4欄位：輸入表單 -->
    <div class="card">
        <h3>📄 資料輸入表單</h3>
        <div class="form-grid">
            <div class="form-group">
                <label for="col_id">1. 單號 / 編號</label>
                <input type="text" id="col_id" placeholder="自動生成中..." readonly>
            </div>
            <div class="form-group">
                <label for="col_date">2. 日期</label>
                <input type="date" id="col_date">
            </div>
            <div class="form-group">
                <label for="col_main_cat">3. 主分類</label>
                <select id="col_main_cat">
                    <option value="財務記帳">財務記帳</option>
                    <option value="工作任務">工作任務</option>
                    <option value="客戶管理">客戶管理</option>
                    <option value="行政庶務">行政庶務</option>
                </select>
            </div>
            <div class="form-group">
                <label for="col_sub_cat">4. 子分類</label>
                <input type="text" id="col_sub_cat" placeholder="請輸入子分類（例如：餐費、會議、客訴）">
            </div>
            <div class="form-group">
                <label
 for="col_source">5. 資料來源</label>
                <input type="text" id="col_source" placeholder="例如：官方網站、電話、Email">
            </div>
            <div class="form-group">
                <label for="col_user">6. 經辦人 / 填表人</label>
                <input type="text" id="col_user" placeholder="請輸入姓名">
            </div>
            <div class="form-group full-width">
                <label for="col_content">7. 內容描述</label>
                <textarea id="col_content" placeholder="請詳細輸入主要資料內容..."></textarea>
            </div>
            <div class="form-group full-width">
                <label for="col_note">8. 備註欄位</label>
                <input type="text" id="col_note" placeholder="可選填其他補充說明">
            </div>
        </div>
        <button onclick="processData()">📥 儲存並自動分類</button>
    </div>

    <!-- 5-8欄位：顯示與收集資料庫 -->
    <div class="card">
        <div class="btn-group">
            <h3>📊 系統已收集資料（共 8 欄位）</h3>
            <button class="excel-btn" onclick="exportToExcel()">📊 匯出 Excel (CSV)</button>
            <button class="clear-btn" onclick="clearData()">清空所有紀錄</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>編號</th>
                        <th>日期</th>
                        <th>主分類</th>
                        <th>子分類</th>
                        <th>資料來源</th>
                        <th>內容描述</th>
                        <th>經辦人</th>
                        <th>備註說明</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 資料由 JavaScript 自動生成 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 初始化網頁
        window.onload = function() {
            initForm();
            renderTable();
        };

        // 自動初始化日期與流水編號
        function initForm() {
            document.getElementById('col_date').value = new Date().toISOString().slice(0, 10);
            const currentData = JSON.parse(localStorage.getItem('eightColDatabase')) || [];
            const nextId = currentData.length > 0 ? parseInt(currentData[0].id.replace('SN', '')) + 1 : 1001;
            document.getElementById('col_id').value = 'SN' + nextId;
        }

        // 收集並處理資料
        function processData() {
            const id = document.getElementById('col_id').value;
            const date = document.getElementById('col_date').value;
            const main_cat = document.getElementById('col_main_cat').value;
            const sub_cat = document.getElementById('col_sub_cat').value.trim();
            const source = document.getElementById('col_source').value.trim();
            const user = document.getElementById('col_user').value.trim();
            const content = document.getElementById('col_content').value.trim();
            const note = document.getElementById('col_note').value.trim();

            if (!content) {
                alert('「內容描述」為必填項目！');
                return;
            }

            // 建立 8 欄位資料物件
            const newData = {
                id: id,
                date: date,
                main_cat: main_cat,
                sub_cat: sub_cat || "未分類",
                source: source || "未註明",
                user: user || "系統匿名",
                content: content,
                note: note || "-"
            };

            // 存入 LocalStorage
            let currentData = JSON.parse(localStorage.getItem('eightColDatabase')) || [];
            currentData.unshift(newData); // 最新資料置頂
            localStorage.setItem('eightColDatabase', JSON.stringify(currentData));

            // 更新畫面與重置表單
            renderTable();
            document.getElementById('col_sub_cat').value = '';
            document.getElementById('col_source').value = '';
            document.getElementById('col_content').value = '';
            document.getElementById('col_note').value = '';
            initForm();
        }

        // 渲染 8 欄位表格
        function renderTable() {
            const tableBody = document.getElementById('dataTableBody');
            const currentData = JSON.parse(localStorage.getItem('eightColDatabase')) || [];

            if (currentData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#999; padding: 20px;">目前尚無收集到任何數據。</td></tr>`;
                return;
            }

            // 對應不同主分類的標籤顏色
            const catColors = { '財務記帳': 'bg-A', '工作任務': 'bg-B', '客戶管理': 'bg-C', '行政庶務': 'bg-D' };

            tableBody.innerHTML = currentData.map(item => {
                const badgeClass = catColors[item.main_cat] || 'bg-other';
                return `
                    <tr>
                        <td><strong>${item.id}</strong></td>
                        <td>${item.date}</td>
                        <td><span class="badge ${badgeClass}">${item.main_cat}</span></td>
                        <td>${escapeHtml(item.sub_cat)}</td>
                        <td>${escapeHtml(item.source)}</td>
                        <td>${escapeHtml(item.content)}</td>
                        <td>${escapeHtml(item.user)}</td>
                        <td><small style="color:#666;">${escapeHtml(item.note)}</small></td>
                    </tr>
                `;
            }).join('');
        }

        // 匯出至 Excel (完整 8 欄位結構)
        function exportToExcel() {
            const currentData = JSON.parse(localStorage.getItem('eightColDatabase')) || [];
            if (currentData.length === 0) {
                alert('目前沒有資料可以匯出！');
                return;
            }

            // 1. 定義 8 個欄位的標頭
            let csvContent = "編號,日期,主分類,子分類,資料來源,內容描述,經辦人,備註說明\n";

            // 2. 走訪資料並清除破壞 CSV 的字元
            currentData.forEach(item => {
                let cleanContent = item.content.replace(/\r?\n|\r/g, " ").replace(/"/g, '""');
                let cleanSub = item.sub_cat.replace(/"/g, '""');
                let cleanSource = item.source.replace(/"/g, '""');
                let cleanUser = item.user.replace(/"/g, '""');
                let cleanNote = item.note.replace(/"/g, '""');

                csvContent += `"${item.id}","${item.date}","${item.main_cat}","${cleanSub}","${cleanSource}","${cleanContent}","${cleanUser}","${cleanNote}"\n`;
            });

            // 3. UTF-8 BOM 防止微軟 Excel 中文亂碼
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            const dateStr = new Date().toISOString().slice(0,10);
            
            link.setAttribute("href", url);
            link.setAttribute("download", `8欄位數據收集表_${dateStr}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 清空資料
        function clearData() {
            if (confirm('確定要清空所有已收集的 8 欄位資料嗎？')) {
                localStorage.removeItem('eightColDatabase');
                renderTable();
                initForm();
            }
        }

        // 防 XSS 注入
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
