html<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG 設備碳盤查數據收集系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1000px; margin: 30px auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        h2, h3 { color: #2c3e50; margin-top: 0; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 4px solid #27ae60; }
        
        /* 8欄位表單排版 */
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 2; }
        label { font-weight: bold; margin-bottom: 5px; color: #34495e; font-size: 14px; }
        input, select, textarea { padding: 10px 12px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 14px; box-sizing: border-box; background-color: #fff; }
        input[readonly] { background-color: #edf2f7; color: #4a5568; }
        
        button { background-color: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px; font-weight: bold; width: 100%; }
        button:hover { background-color: #219653; }
        
        .btn-group { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; width: 100%; }
        .excel-btn { background-color: #2980b9; margin-top: 0; width: auto; }
        .excel-btn:hover { background-color: #1f6391; }
        .clear-btn { background-color: #e74c3c; margin-left: auto; margin-top: 0; width: auto; }
        .clear-btn:hover { background-color: #c0392b; }
        
        /* 表格排版 */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; font-size: 13px; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f8fafc; }
    </style>
</head>
<body>

    <h2>🌱 ESG 設備碳盤查數據收集系統</h2>

    <!-- 1-8欄位：輸入表單 -->
    <div class="card">
        <h3>📄 盤查數據輸入表單</h3>
        <div class="form-grid">
            
            <div class="form-group">
                <label for="col_company">第一欄：區域 / 公司名稱</label>
                <input type="text" id="col_company" placeholder="請輸入區域或公司（例如：台北總部、一號廠區）">
            </div>
            
            <div class="form-group">
                <label for="col_water">第二欄：飲水機規格 / 編號</label>
                <input type="text" id="col_water" placeholder="例如：賀眾牌-3F茶水間（若無請填無或-）">
            </div>
            
            <div class="form-group">
                <label for="col_septic">第三欄：化糞池使用情形 / 備註</label>
                <input type="text" id="col_septic" placeholder="例如：定期清理、投藥量（若無請填無或-）">
            </div>
            
            <div class="form-group">
                <label for="col_fridge">第四欄：冰箱冷媒型號 / 數量</label>
                <input type="text" id="col_fridge" placeholder="例如：R134a - 共2台（若無請填無或-）">
            </div>
            
            <div class="form-group">
                <label for="col_car">第五欄：車輛冷氣保養 / 車號</label>
                <input type="text" id="col_car" placeholder="例如：公務車 ABC-1234 冷媒添加（若無請填無或-）">
            </div>
            
            <div class="form-group">
                <label for="col_fire">第六欄：滅火器規格 / 藥劑類型</label>
                <input type="text" id="col_fire" placeholder="例如：乾粉 10P - 15支（若無請填無或-）">
            </div>

            <div class="form-group">
                <label for="col_amount">第七欄：活動數據 (填入使用量或冷媒填充量數值)</label>
                <input type="number" id="col_amount" step="any" placeholder="例如：12.5 (純數字)">
            </div>

            <div class="form-group">
                <label for="col_user">第八欄：盤查登錄人 / 時間</label>
                <input type="text" id="col_user" placeholder="請輸入您的姓名">
            </div>

        </div>
        <button onclick="saveData()">📥 儲存本筆盤查紀錄</button>
    </div>

    <!-- 數據顯示區塊 -->
    <div class="card">
        <div class="btn-group">
            <h3>📊 設備盤查歷次數據庫（標準 8 欄位）</h3>
            <button class="excel-btn" onclick="exportToExcel()">📊 匯出完整 Excel (CSV)</button>
            <button class="clear-btn" onclick="clearData()">清空所有紀錄</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>區域/公司</th>
                        <th>飲水機</th>
                        <th>化糞池</th>
                        <th>冰箱</th>
                        <th>車輛冷氣</th>
                        <th>滅火器</th>
                        <th>活動數據值</th>
                        <th>盤查登錄人</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 資料由 JavaScript 自動生成 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        window.onload = function() {
            renderTable();
        };

        // 儲存資料
        function saveData() {
            const company = document.getElementById('col_company').value.trim();
            const water = document.getElementById('col_water').value.trim();
            const septic = document.getElementById('col_septic').value.trim();
            const fridge = document.getElementById('col_fridge').value.trim();
            const car = document.getElementById('col_car').value.trim();
            const fire = document.getElementById('col_fire').value.trim();
            const amount = document.getElementById('col_amount').value.trim();
            const user = document.getElementById('col_user').value.trim();

            if (!company || !amount) {
                alert('「區域/公司名稱」與「活動數據值」為主要必填項目！');
                return;
            }

            const newData = {
                company: company,
                water: water || "-",
                septic: septic || "-",
                fridge: fridge || "-",
                car: car || "-",
                fire: fire || "-",
                amount: amount,
                user: user || "系統匿名"
            };

            let currentData = JSON.parse(localStorage.getItem('esgDeviceDB')) || [];
            currentData.unshift(newData); // 最新資料置頂
            localStorage.setItem('esgDeviceDB', JSON.stringify(currentData));

            renderTable();
            
            // 清空輸入框（保留公司名稱與登錄人，方便連續輸入）
            document.getElementById('col_water').value = '';
            document.getElementById('col_septic').value = '';
            document.getElementById('col_fridge').value = '';
            document.getElementById('col_car').value = '';
            document.getElementById('col_fire').value = '';
            document.getElementById('col_amount').value = '';
        }

        // 渲染表格
        function renderTable() {
            const tableBody = document.getElementById('dataTableBody');
            const currentData = JSON.parse(localStorage.getItem('esgDeviceDB')) || [];

            if (currentData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#999; padding: 20px;">目前尚無登錄任何設備數據。</td></tr>`;
                return;
            }

            tableBody.innerHTML = currentData.map(item => `
                <tr>
                    <td><strong>${escapeHtml(item.company)}</strong></td>
                    <td>${escapeHtml(item.water)}</td>
                    <td>${escapeHtml(item.septic)}</td>
                    <td>${escapeHtml(item.fridge)}</td>
                    <td>${escapeHtml(item.car)}</td>
                    <td>${escapeHtml(item.fire)}</td>
                    <td><strong style="color: #27ae60;">${escapeHtml(item.amount)}</strong></td>
                    <td>${escapeHtml(item.user)}</td>
                </tr>
            `).join('');
        }

        // 匯出 Excel (CSV)
        function exportToExcel() {
            const currentData = JSON.parse(localStorage.getItem('esgDeviceDB')) || [];
            if (currentData.length === 0) {
                alert('目前沒有數據可以匯出！');
                return;
            }

            let csvContent = "區域/公司,飲水機,化糞池,冰箱,車輛冷氣,滅火器,活動數據值,盤查登錄人\n";

            currentData.forEach(item => {
                let cleanCompany = item.company.replace(/"/g, '""');
                let cleanWater = item.water.replace(/"/g, '""');
                let cleanSeptic = item.septic.replace(/"/g, '""');
                let cleanFridge = item.fridge.replace(/"/g, '""');
                let cleanCar = item.car.replace(/"/g, '""');
                let cleanFire = item.fire.replace(/"/g, '""');
                let cleanAmount = item.amount.replace(/"/g, '""');
                let cleanUser = item.user.replace(/"/g, '""');

                csvContent += `"${cleanCompany}","${cleanWater}","${cleanSeptic}","${cleanFridge}","${cleanCar}","${cleanFire}","${cleanAmount}","${cleanUser}"\n`;
            });

            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            const dateStr = new Date().toISOString().slice(0,10);
            
            link.setAttribute("href", url);
            link.setAttribute("download", `ESG設備盤查數據表_${dateStr}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 清空紀錄
        function clearData() {
            if (confirm('確定要清空所有已登錄的設備數據嗎？此操作無法復原。')) {
                localStorage.removeItem('esgDeviceDB');
                renderTable();
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
